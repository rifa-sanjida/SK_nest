{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm col-md-8 mx-auto">
    <div class="card-header"><h3>Book {{ service.title }}</h3></div>
    <div class="card-body">
        <p><strong>Fee:</strong> ৳{{ service.price }}</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Send Booking Request</button>
        </form>
    </div>
</div>
{% endblock %}
