{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm col-md-6 mx-auto">
    <div class="card-header"><h3>Payment Update</h3></div>
    <div class="card-body">
        <p><strong>Amount:</strong> ৳{{ booking.payment.amount }}</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Submit Payment</button>
        </form>
    </div>
</div>
{% endblock %}
