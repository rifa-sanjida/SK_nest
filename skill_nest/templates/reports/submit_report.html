{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header">
                <h3>Submit Report</h3>
            </div>
            <div class="card-body">
                <p><strong>Service:</strong> {{ booking.service.title }}</p>
                <p><strong>Booking Date:</strong> {{ booking.booking_date }}</p>
                <p><strong>Report Against:</strong> {{ reported_user.get_full_name|default:reported_user.username }}</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        {{ form.reason }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Details</label>
                        {{ form.details }}
                    </div>
                    <button class="btn btn-danger" type="submit">Submit Report</button>
                    <a href="{% url 'dashboard_redirect' %}" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
