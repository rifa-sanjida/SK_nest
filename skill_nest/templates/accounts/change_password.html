{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="content-shell auth-shell">
            <div class="mb-4 text-center">
                <span class="soft-badge">Security Settings</span>
                <h2 class="section-title mt-3 mb-2">Change Password</h2>
                <p class="section-subtitle mx-auto">
                    Update your password to keep your Skill Nest account secure.
                </p>
            </div>

            <form method="post" class="theme-form">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-grid mt-4">
                    <button class="btn skill-btn skill-btn-primary" type="submit">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
