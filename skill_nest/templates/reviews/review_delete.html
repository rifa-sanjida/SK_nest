{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Delete Review</h3>
            </div>
            <div class="card-body">
                <p class="mb-3">Are you sure you want to delete this review?</p>

                <div class="border rounded p-3 bg-light mb-4">
                    <p class="mb-1"><strong>Service:</strong> {{ review.service.title }}</p>
                    <p class="mb-1"><strong>Rating:</strong> {{ review.rating }}/5</p>
                    <p class="mb-0"><strong>Comment:</strong> {{ review.comment }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'learner_booking_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
